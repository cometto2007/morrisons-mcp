services:
  morrisons-mcp:
    image: ghcr.io/cometto2007/morrisons-mcp:latest
    container_name: morrisons-mcp
    restart: unless-stopped
    environment:
      - CACHE_DB_PATH=/data/cache.db
    volumes:
      - morrisons_data:/data
    networks:
      - chrislabnet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.morrisons-mcp.rule=Host(`morrisons-mcp.chrislab.it`)"
      - "traefik.http.routers.morrisons-mcp.entrypoints=https"
      - "traefik.http.routers.morrisons-mcp.tls=true"
      - "traefik.http.routers.morrisons-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.morrisons-mcp.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.morrisons-sse.headers.customresponseheaders.X-Accel-Buffering=no"
      - "traefik.http.routers.morrisons-mcp.middlewares=morrisons-sse"

networks:
  chrislabnet:
    external: true

volumes:
  morrisons_data:
